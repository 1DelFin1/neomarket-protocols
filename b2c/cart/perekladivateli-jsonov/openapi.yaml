openapi: 3.0.3
info:
  title: NeoMarket Favorites Service API
  version: "1.0"
  description: API управления подписками на уведомления о товарах

servers:
  - url: https://api.example.com

tags:
  - name: Подписка
    description: Подписки на уведомления о товарах

paths:
  /api/v1/favorites/{product_id}/subscribe:
    post:
      tags:
        - Подписка
      summary: Подписка на уведомления о товаре
      description: >
        Создаёт подписку для текущего пользователя на уведомления
        о появлении товара в наличии (IN_STOCK) или снижении цены (PRICE_DOWN).
      operationId: subscribeToProduct
      parameters:
        - name: product_id
          in: path
          required: true
          description: UUID товара из B2B
          schema:
            type: string
            format: uuid
          example: "123e4567-e89b-12d3-a456-426614174000"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubscribeRequest'
            example:
              notifyOn: ["IN_STOCK", "PRICE_DOWN"]
      responses:
        '201':
          description: Подписка успешно создана
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubscriptionResponse'
              example:
                id: "6b9c1f4c-4b7c-4f8a-9a3b-6a8a2f95e2d1"
                product:
                  id: "123e4567-e89b-12d3-a456-426614174000"
                  title: "iPhone 15 Pro Max"
                  description: "Флагман Apple"
                  status: "MODERATED"
                  category:
                    id: "3fa85f64-5717-4562-b3fc-2c963f66afa6"
                    name: "Смартфоны"
                  images:
                    - url: "/s3/iphone15-1.jpg"
                      ordering: 0
                  characteristics:
                    - name: "Бренд"
                      value: "Apple"
                  skus:
                    - id: "7e1f5f3c-5e9c-4f1d-bf18-1f8f0a9c1b2c"
                      name: "256GB Black"
                      price: 12999000
                      activeQuantity: 5
                      characteristics:
                        - name: "Цвет"
                          value: "Чёрный"
                        - name: "Объём памяти"
                          value: "256 ГБ"
                notifyOn: ["IN_STOCK", "PRICE_DOWN"]
                createdAt: "2026-03-09T12:00:00Z"
        '400':
          description: Невалидный запрос — пустой или некорректный массив notifyOn
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: "INVALID_NOTIFY_ON"
                message: "Должен быть указан хотя бы один тип уведомления"
        '401':
          description: Токен отсутствует или невалиден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: "UNAUTHORIZED"
                message: "Токен отсутствует или невалиден"
        '404':
          description: Товар с указанным UUID не найден в Product Service
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: "PRODUCT_NOT_FOUND"
                message: "Товар с указанным идентификатором не найден"
        '409':
          description: Подписка на данный товар уже существует
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: "SUBSCRIPTION_ALREADY_EXISTS"
                message: "Вы уже подписаны на уведомления об этом товаре"
        '500':
          description: Внутренняя ошибка сервера
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: "INTERNAL_SERVER_ERROR"
                message: "Произошла внутренняя ошибка сервера"
        '503':
          description: Product Service (B2B) временно недоступен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: "SERVICE_UNAVAILABLE"
                message: "Сервис временно недоступен, попробуйте позже"

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    SubscribeRequest:
      type: object
      required:
        - notifyOn
      properties:
        notifyOn:
          type: array
          description: >
            Список событий, на которые хочет подписаться пользователь.
            IN_STOCK — уведомление о появлении товара в наличии.
            PRICE_DOWN — уведомление о снижении цены.
          items:
            type: string
            enum: [IN_STOCK, PRICE_DOWN]
          minItems: 1
          example: ["IN_STOCK", "PRICE_DOWN"]

    SubscriptionResponse:
      type: object
      description: Подписка пользователя на уведомления о товаре
      properties:
        id:
          type: string
          format: uuid
          description: UUID подписки
          example: "6b9c1f4c-4b7c-4f8a-9a3b-6a8a2f95e2d1"
        product:
          $ref: '#/components/schemas/Product'
        notifyOn:
          type: array
          description: События, на которые подписан пользователь
          items:
            type: string
            enum: [IN_STOCK, PRICE_DOWN]
          example: ["IN_STOCK", "PRICE_DOWN"]
        createdAt:
          type: string
          format: date-time
          description: Дата создания подписки
          example: "2026-03-09T12:00:00Z"

    Product:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: "123e4567-e89b-12d3-a456-426614174000"
        title:
          type: string
          example: "iPhone 15 Pro Max"
        description:
          type: string
          example: "Флагман Apple"
        status:
          type: string
          enum: [CREATED, ON_MODERATION, MODERATED, BLOCKED]
        category:
          $ref: '#/components/schemas/Category'
        images:
          type: array
          items:
            $ref: '#/components/schemas/Image'
        characteristics:
          type: array
          items:
            $ref: '#/components/schemas/Characteristic'
        skus:
          type: array
          items:
            $ref: '#/components/schemas/SKU'

    SKU:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: "7e1f5f3c-5e9c-4f1d-bf18-1f8f0a9c1b2c"
        name:
          type: string
          example: "256GB Black"
        price:
          type: integer
          description: Цена в копейках
          example: 12999000
        activeQuantity:
          type: integer
          example: 5
        characteristics:
          type: array
          items:
            $ref: '#/components/schemas/Characteristic'

    Category:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: "3fa85f64-5717-4562-b3fc-2c963f66afa6"
        name:
          type: string
          example: "Смартфоны"

    Image:
      type: object
      properties:
        url:
          type: string
          example: "/s3/iphone15-1.jpg"
        ordering:
          type: integer
          example: 0

    Characteristic:
      type: object
      properties:
        name:
          type: string
          example: "Бренд"
        value:
          type: string
          example: "Apple"

    ErrorResponse:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          description: Машиночитаемый код ошибки
          example: "PRODUCT_NOT_FOUND"
        message:
          type: string
          description: Описание ошибки для пользователя
          example: "Товар с указанным идентификатором не найден"
